services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    depends_on:
      postgresql:
        condition: service_healthy
      elasticsearch:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      # Point services to their container hostnames
      PGHOST: postgresql
      PGUSER: postgres
      PGPASSWORD: test

  postgresql:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ..:/v6_api
      - ../docker/conf/postgresql.conf:/etc/postgresql.conf
    command: ["postgres", "-c", "config_file=/etc/postgresql.conf"]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: "docker.io/c2corg/c2corg_es:anon-2018-11-02"
    command: -Des.index.number_of_replicas=0 -Des.path.data=/c2corg_anon -Des.script.inline=true
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  redis:
    image: redis:7.2
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
