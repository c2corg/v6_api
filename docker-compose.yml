  elasticsearch:
    container_name: elasticsearch
    build:
      context: .
      dockerfile: elasticsearch8.Dockerfile
    environment:
      - ELASTIC_PASSWORD=elastic2024
      - discovery.type=single-node
      - xpack.security.http.ssl.enabled=false
      - xpack.license.self_generated.type=basic
    ports:
      - 9200:9200
      - 9300:9300
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

